version: "3.8"
services:
  openfang:
    build: .
    ports:
      - "50051:50051"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./config.toml:/data/config.toml
      - openfang-data-v2:/data
    restart: unless-stopped

volumes:
  openfang-data-v2:
